<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" fill="none" role="img" aria-label="TNext Cigar">
  <defs>
    <style>
      .tnc-word {
        font-family: "Georgia", "Playfair Display", "Times New Roman", serif;
        font-weight: 900;
        letter-spacing: -0.02em;
        fill: #f5efe0;
      }
      .tnc-tag {
        font-family: "Helvetica Neue", "Inter", system-ui, -apple-system, sans-serif;
        font-weight: 600;
        letter-spacing: 0.34em;
        fill: #f5efe0;
      }
      .tnc-line { stroke: #f5efe0; }
      .tnc-smoke { stroke: #ff2e2e; }
    </style>
  </defs>

  <!-- TNext wordmark -->
  <text x="450" y="200" class="tnc-word" font-size="220" text-anchor="middle">TNext</text>

  <!-- Hairline left -->
  <line x1="180" y1="262" x2="425" y2="262" class="tnc-line" stroke-width="3" stroke-linecap="round"/>

  <!-- Smoke wisp (accent red on dark background) -->
  <path d="M450 232
           c -14 14, 18 26, 0 44
           c -16 18, 16 26, 0 44"
        class="tnc-smoke" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Hairline right -->
  <line x1="475" y1="262" x2="720" y2="262" class="tnc-line" stroke-width="3" stroke-linecap="round"/>

  <!-- CIGAR tag -->
  <text x="450" y="348" class="tnc-tag" font-size="58" text-anchor="middle">CIGAR</text>
</svg>
