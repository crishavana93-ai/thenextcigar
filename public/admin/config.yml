# Sveltia CMS configuration — TNext Cigar
# Sveltia is a Decap-CMS-compatible editor that uses a hosted OAuth proxy at
# auth.sveltia.app, so we don't need to run our own Cloudflare Pages Functions.
#
# Auth flow:
#   1. User clicks "Login with GitHub" at /admin/
#   2. Popup goes to GitHub OAuth (your registered app)
#   3. GitHub redirects to https://auth.sveltia.app/ (you must set this as the
#      Authorization callback URL on your GitHub OAuth App)
#   4. Sveltia's proxy exchanges the code for a token and posts it back to
#      your /admin/ window via postMessage
#   5. CMS loads, you can edit articles

backend:
  name: github
  repo: crishavana93-ai/thenextcigar
  branch: main
  # No base_url or auth_endpoint specified → Sveltia uses auth.sveltia.app
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload {{path}}'
    deleteMedia: 'CMS: delete media {{path}}'

display_url: https://thenextcigar.com
site_url: https://thenextcigar.com
locale: en
show_preview_links: true

media_folder: public/uploads
public_folder: /uploads

logo_url: /logo.svg

collections:
  # ─────────────────────────────────────────────────────────────────────
  # ARTICLES (blog posts)
  # ─────────────────────────────────────────────────────────────────────
  - name: blog
    label: Articles
    label_singular: Article
    folder: src/content/blog
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: '{{slug}}'
    summary: '{{title}} — {{publishedAt | date(''YYYY-MM-DD'')}}'
    sortable_fields: [publishedAt, title, category]
    view_filters:
      - label: Featured
        field: featured
        pattern: true
      - label: Members only
        field: isPremium
        pattern: true
      - label: Published this year
        field: publishedAt
        pattern: '2026'
    view_groups:
      - label: By Category
        field: category
    fields:
      - { name: title,       label: 'Title',           widget: string,  required: true,  hint: 'The headline. Aim for 50–70 characters for SEO.' }
      - { name: slug,        label: 'URL slug',        widget: string,  required: true,  hint: 'Lowercase, hyphens, no spaces. Becomes /blog/<slug>/.' }
      - { name: excerpt,     label: 'Excerpt',         widget: text,    required: false, hint: '1–2 sentence summary. Used as the meta description and on cards.' }
      - { name: publishedAt, label: 'Publish date',    widget: datetime, required: true,  date_format: 'YYYY-MM-DD', time_format: 'HH:mm' }
      - { name: updatedAt,   label: 'Last updated',    widget: datetime, required: false, date_format: 'YYYY-MM-DD', time_format: 'HH:mm' }

      - name: category
        label: 'Category'
        widget: relation
        collection: categories
        search_fields: [name, slug]
        value_field: '{{slug}}'
        display_fields: [name]
        required: false

      - name: author
        label: 'Author'
        widget: relation
        collection: authors
        search_fields: [name, slug]
        value_field: '{{slug}}'
        display_fields: [name]
        required: false

      - { name: cover,     label: 'Cover image',     widget: image, required: false, hint: '1600×900 recommended.' }
      - { name: thumbnail, label: 'Thumbnail',       widget: image, required: false, hint: 'Optional — defaults to cover if blank.' }

      - { name: featured,        label: 'Featured (homepage hero)', widget: boolean, default: false, required: false }
      - { name: sidebarFeatured, label: 'Sidebar featured',         widget: boolean, default: false, required: false }
      - { name: isPremium,       label: 'Members-only',             widget: boolean, default: false, required: false }

      - name: seo
        label: 'SEO (optional — fills from above if blank)'
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: metaTitle,       label: 'Meta title',       widget: string, required: false, hint: '50–60 chars. Defaults to article title.' }
          - { name: metaDescription, label: 'Meta description', widget: text,   required: false, hint: '150–160 chars. Defaults to excerpt.' }
          - { name: focusKeyword,    label: 'Focus keyword',    widget: string, required: false, hint: 'For your editorial QA only — not exposed publicly.' }
          - { name: ogImage,         label: 'OG image',         widget: image,  required: false, hint: '1200×630. Defaults to cover.' }
          - { name: canonicalUrl,    label: 'Canonical URL',    widget: string, required: false, hint: 'Only set if originally published elsewhere.' }
          - { name: noIndex,         label: 'Hide from search', widget: boolean, default: false, required: false }

      - name: body
        label: 'Article body'
        widget: markdown
        required: true
        hint: 'Full article. Markdown + headings, formatting, links, images, embeds.'

      - { name: sourceId, label: 'Source ID', widget: hidden, default: '', required: false }

  # ─────────────────────────────────────────────────────────────────────
  # CATEGORIES
  # ─────────────────────────────────────────────────────────────────────
  - name: categories
    label: Categories
    label_singular: Category
    folder: src/content/categories
    create: true
    delete: false
    extension: json
    format: json
    slug: '{{slug}}'
    identifier_field: slug
    fields:
      - { name: slug,        label: 'Slug',         widget: string, required: true }
      - { name: name,        label: 'Display name', widget: string, required: true }
      - { name: description, label: 'Description',  widget: text,   required: false }
      - { name: thumbnail,   label: 'Thumbnail',    widget: string, required: false }

  # ─────────────────────────────────────────────────────────────────────
  # AUTHORS
  # ─────────────────────────────────────────────────────────────────────
  - name: authors
    label: Authors
    label_singular: Author
    folder: src/content/authors
    create: true
    delete: false
    extension: json
    format: json
    slug: '{{slug}}'
    identifier_field: slug
    fields:
      - { name: slug,      label: 'Slug',        widget: string, required: true }
      - { name: name,      label: 'Full name',   widget: string, required: true }
      - { name: jobTitle,  label: 'Job title',   widget: string, required: false }
      - { name: excerpt,   label: 'Short bio',   widget: text,   required: false }
      - { name: bio,       label: 'Long bio',    widget: markdown, required: false }
      - { name: email,     label: 'Email',       widget: string, required: false }
      - { name: website,   label: 'Website',     widget: string, required: false }
      - { name: twitter,   label: 'X / Twitter', widget: string, required: false }
      - { name: instagram, label: 'Instagram',   widget: string, required: false }
      - { name: linkedin,  label: 'LinkedIn',    widget: string, required: false }
      - { name: facebook,  label: 'Facebook',    widget: string, required: false }
      - { name: avatar,    label: 'Avatar (filename)',   widget: string, required: false }
      - { name: portrait,  label: 'Portrait (filename)', widget: string, required: false }
