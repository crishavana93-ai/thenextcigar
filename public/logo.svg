<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" fill="none" role="img" aria-label="TNext Cigars">
  <defs>
    <style>
      .tnc-word {
        font-family: "Helvetica Neue", "Inter", "Arial", system-ui, -apple-system, sans-serif;
        font-weight: 900;
        letter-spacing: -0.06em;
      }
      .tnc-tag {
        font-family: "Helvetica Neue", "Inter", "Arial", system-ui, -apple-system, sans-serif;
        font-weight: 500;
        letter-spacing: 0.38em;
      }
    </style>
  </defs>

  <!-- Bold sans-serif wordmark -->
  <text x="500" y="225" class="tnc-word" font-size="240" text-anchor="middle" fill="#1a1d2e">TNext</text>

  <!-- Hairline left -->
  <line x1="240" y1="305" x2="465" y2="305" stroke="#1a1d2e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Smoke / flame glyph — single elegant S-curve, double-stroked for the cigar-smoke feel -->
  <g stroke="#1a1d2e" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M484 278 C 472 290, 472 304, 484 316 C 496 328, 496 342, 484 354"/>
    <path d="M516 278 C 528 290, 528 304, 516 316 C 504 328, 504 342, 516 354"/>
  </g>

  <!-- Hairline right -->
  <line x1="535" y1="305" x2="760" y2="305" stroke="#1a1d2e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CIGARS tag -->
  <text x="500" y="402" class="tnc-tag" font-size="56" text-anchor="middle" fill="#1a1d2e">CIGARS</text>
</svg>
